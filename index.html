  <div class="card">
    <div class="img-box" id="shoe">👟</div>
    <h3>Running Pro X</h3>
    <div class="price">$129.99</div>
    <div class="colors">
      <div class="color active" style="background:#38bdf8;" onclick="changeColor(this, '#38bdf8')"></div>
      <div class="color" style="background:#f43f5e;" onclick="changeColor(this, '#f43f5e')"></div>
      <div class="color" style="background:#a855f7;" onclick="changeColor(this, '#a855f7')"></div>
    </div>
    <button class="add-btn" id="addBtn" onclick="addToCart()">Add to Cart</button>
  </div>
  <script>
    function changeColor(el, color) {
      document.querySelectorAll('.color').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('shoe').style.background = color;
    }
    function addToCart() {
      const btn = document.getElementById('addBtn');
      btn.innerText = '✓ Added!';
      btn.classList.add('added');
      setTimeout(() => {
        btn.innerText = 'Add to Cart';
        btn.classList.remove('added');
      }, 2000);
    }
  </script>
